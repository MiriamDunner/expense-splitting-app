name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    outputs:
      has-test-script: ${{ steps.detect_test.outputs.has_test_script }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Verify pnpm is available
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure pnpm scripts are allowed
        run: pnpm config set ignore-scripts false

      - name: Detect frontend test script
        id: detect_test
        run: |
          if node -e "process.exit(!require('./package.json').scripts?.test)"; then
            echo "has_test_script=true" >> $GITHUB_OUTPUT
          else
            echo "has_test_script=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Run frontend tests (if configured)
        if: steps.detect_test.outputs.has_test_script == 'true'
        run: pnpm test

      - name: Detect eslint
        id: detect_eslint
        run: |
          if node -e "process.exit(!(require('./package.json').devDependencies?.eslint || require('./package.json').dependencies?.eslint))"; then
            echo "has_eslint=true" >> $GITHUB_OUTPUT
          else
            echo "has_eslint=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Lint (if eslint is installed)
        if: steps.detect_eslint.outputs.has_eslint == 'true'
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        env:
          NEXT_DISABLE_TURBOPACK: '1'
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm build

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml') }}

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: scripts
        run: python -m pytest -q

      - name: Verify Python files compile
        working-directory: scripts
        run: python -m compileall -q .

  deploy:
    name: Deploy (Vercel + optional backend)
    needs: [frontend, backend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          prod: true

      - name: Deploy backend to Fly.io (optional)
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "FLY_API_TOKEN not set; skipping backend deploy."
            exit 0
          fi
          curl -L https://fly.io/install.sh | sh
          ~/.fly/bin/flyctl deploy --config scripts/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
